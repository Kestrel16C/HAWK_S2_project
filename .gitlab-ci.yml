stages: [pages]

pages:
  stage: pages
  rules:
    - if: '$PAGES_ENABLE == "1"'
      when: on_success
    - when: never
  image: alpine:3.20
  before_script:
    - apk add --no-cache rsync
  script:
    - mkdir -p public
    - rsync -a --delete docs/ public/
  artifacts:
    paths: [public]
    expire_in: 14 days
